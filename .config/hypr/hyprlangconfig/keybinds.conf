# тФГ тФГтФПтФБтФЫтФГ тФГтФПтФБ тФЫтФПтФБ тФПтФБ тФПтФБтФЫ
# тФПтФЫ тФПтФБтФЫтФБтФПтФЫтФПтФБтФГтФГтФГ тФГтФГ тФГтФБтФБтФГ
# тФЫ тФЫтФБтФБтФЫ тФЫ тФБтФБ тФЫтФЫ тФЫтФБтФБ тФБтФБтФЫ

$mainMod = SUPER # Sets "Windows" key as main modifier

# GENERAL
bind = CTRL ALT, RETURN, exec, kitty
bind = $mainMod, RETURN, exec, foot
bind = $mainMod, V, exec, hyprctl dispatch togglefloating
bind = $mainMod, F, exec, hyprctl dispatch fullscreen
bind = CTRL, Q, killactive,
bind = CTRL ALT, Q, forcekillactive,
bind = $mainMod, L, exec, $HOME/.local/bin/scripts/wlogout.sh
bind = ALT, SPACE, exec, fuzzel

#layoutmsg
bind = $mainMod, J, layoutmsg, togglesplit
# layout master
# bind = $mainMod, M, layoutmsg, addmaster
# bind = $mainMod, N, layoutmsg, removemaster

# Switch workspaces with mainMod 
bind = CTRL, 1, workspace, 1
bind = CTRL, 2, workspace, 2
bind = CTRL, 3, workspace, 3
bind = CTRL, 4, workspace, 4
bind = CTRL, 5, workspace, 5
bind = CTRL, 6, workspace, 6
bind = CTRL, 7, workspace, 7
bind = CTRL, 8, workspace, 8
bind = CTRL, 9, workspace, 9
bind = CTRL, 0, workspace, 10

# Move active window to a workspace
bind = CTRL ALT, 1, movetoworkspace, 1
bind = CTRL ALT, 2, movetoworkspace, 2
bind = CTRL ALT, 3, movetoworkspace, 3
bind = CTRL ALT, 4, movetoworkspace, 4
bind = CTRL ALT, 5, movetoworkspace, 5
bind = CTRL ALT, 6, movetoworkspace, 6
bind = CTRL ALT, 7, movetoworkspace, 7
bind = CTRL ALT, 8, movetoworkspace, 8
bind = CTRL ALT, 9, movetoworkspace, 9
bind = CTRL ALT, 0, movetoworkspace, 10

# Switch to special workspace where apps have been preloaded at boot
bind = ALT, M, togglespecialworkspace, magick1
bind = ALT, comma, togglespecialworkspace, magick2 

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#PLUGINS
# This will toggle ScrollOverview when SUPER+g is pressed
bind = $mainMod, I, scrolloverview:overview, toggle

# Windows movement
# 1. cycle tabs
bind = $mainMod, Tab, cyclenext
# 2. Move focus 
bind = ALT, H, movefocus, l
bind = ALT, L, movefocus, r
bind = ALT, K, movefocus, u
bind = ALT, J, movefocus, d
# 3. Swap active window
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d

#MAKO notification daemon
bind = $mainMod, M, exec, makoctl dismiss -a
bind = CTRL ALT, M, exec, makoctl restore

# hyprsunset
bind = $mainMod, BackSpace, exec, ~/.local/bin/scripts/hyprsunset_start
bind = $mainMod ALT, BackSpace, exec, ~/.local/bin/scripts/hyprsunset_kill

# Capslock toggle
bind = CAPS, Caps_Lock, exec, ~/.local/bin/scripts/capslock

# Animation toggle
bind = $mainMod CTRL, B, exec, ~/.local/bin/scripts/animation_toggle

# Bat conservation mode
bind = $mainMod, B, exec, sudo /home/satya/.local/bin/scripts/conservation_mode 

# Power-profile daemon
bind= $mainMod, Delete, exec, ~/.local/bin/scripts/performance
bind= $mainMod, Prior, exec, ~/.local/bin/scripts/balanced
bind= $mainMod, Next, exec, ~/.local/bin/scripts/power_saving

# Screenshot utility (hyprshot+satty)
bind = $mainMod, O, exec, hyprshot -z --raw -m region | satty -f '-' --resize 600x600 
bind = $mainMod, P, exec, hyprshot -z --raw -m active -m window | satty -f '-' --resize 600x600 

# bind = $mainMod, O, exec, hyprshot -m region -o /home/satya/Pictures/Screenshots/
# bind = $mainMod, P, exec, hyprshot -m active -m window -o /home/satya/Pictures/Screenshots/

# Wallpaper
bind = CTRL ALT, W, exec, ~/.local/bin/scripts/awww_selector

# #hypridle
bind = CTRL ALT, L, exec, ~/.local/bin/scripts/hypridle_kill
bind = CTRL SHIFT ALT, L, exec, ~/.local/bin/scripts/hypridle_start

# Peek desktop
bind = $mainMod, D, exec, ~/.local/bin/scripts/peek_desktop

# Waybar
bind = CTRL ALT, R, exec, ~/.local/bin/scripts/waybar_rel

# Hyprpicker
bind = CTRL ALT, P, exec, hyprpicker -a

# cliphist
bind = $mainMod, C, exec, ~/.local/bin/scripts/cliphist
bind = $mainMod SHIFT, C, exec, cliphist wipe

# Zoom
bind = $mainMod,mouse_down,exec,hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float*1.1')
bind = $mainMod,mouse_up,exec,hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float*0.9) | if . < 1 then .=1 else . end') 
binde = $mainMod,Up,exec,hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float*1.1')
binde = $mainMod,Down,exec,hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float*0.9) | if . < 1 then .=1 else . end') 
bind = $mainMod,mouse:274,exec,hyprctl -q keyword cursor:zoom_factor 1

# Use 'binde' instead of 'bind' for repeat functionality
# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioRaiseVolume, exec, ~/.local/bin/scripts/max_vol
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindel = ,F11, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,F12, exec, ~/.local/bin/scripts/max_vol
bindel = ,F10, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindel = ,F9, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Requires playerctl
# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
