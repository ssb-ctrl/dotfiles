# έΦΠέΦΒέΦδέΦΠέΦΒ έΦΔ έΦΔ
# έΦΠέΦΒέΦδέΦΔ έΦΔέΦΔ έΦΔ
# έΦΒέΦΒέΦδέΦδ έΦδ έΦδ 

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = XCURSOR_THEME = Bibata-Modern-Ice
env = XCURSOR_SIZE = 24

env = MOZ_ENABLE_WAYLAND,1
# env = MOZ_DISABLE_GPU,1
# env = EGL_PLATFORM,wayland         # Use Wayland EGL platform
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# PROTON compatibility layer
env = PROTON_ENABLE_WAYLAND,1 
env = PROTON_ENABLE_HDR,1

# QT env variables 
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GTK env variables 
env = GDK_SCALE,2
env = GDK_BACKEND,wayland
env = GTK_THEME,Tokyonight-B-LB-Dark-Moon

env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland

#use full for more verbose logs
env = RUST_BACKTRACE,0 

# default terminal
env = TERMINAL, foot
