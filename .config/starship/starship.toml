# 1.general prompt-wide configuratoin options
"$schema" = 'https://starship.rs/config-schema.json' # get editor completions based on the config schema

add_newline = false

# wait 35 milliseconds for starship to check files under the current directory.
scan_timeout = 35

# 2.format
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_metrics\
$git_status\
$docker_context\
$package\
$c\
$cpp\
$cmake\ 
$golang\
$java\
$lua\
$nim\
$nodejs\
$ocaml\
$perl\
$python\
$ruby\
$rust\
$scala\
$solidity\
$meson\
$cmd_duration\
$line_break\
$character"""

# 3.modules
[os]
disabled = false
format = "[$symbol](bold #00adff)"
[os.symbols]
Arch = " "

[username]
disabled = false
# format = '[$user ](bold #ffc777) in '00c7df
format = '[$user ](bold #ffc777) in '
show_always = true

[hostname]
disabled = true
ssh_only = false
format = '[@$hostname](bold #f91880)\] in '
#bd91f0

[directory]
disabled = false
format = "[$path](italic #73daca)[$read_only](italic $read_only_style) "
read_only = " 󰌾 "
read_only_style = "#e1a517"
truncation_length = 6
truncation_symbol = '…/'
truncate_to_repo = true

[git_branch]
disabled = false
always_show_remote = false
symbol = '(bold $style) '
style = 'bold #fca7ea'
format = 'on [$symbol$branch(:$remote_name)](bold $style) '
truncation_length = 10
truncation_symbol = '…/'

[git_commit]
disabled = false
commit_hash_length = 7
format = '[\($hash$tag\)](bold #ff996a) '
tag_symbol = '🔖 '
tag_disabled = false

[git_metrics]
disabled = false
only_nonzero_diffs = true 
added_style =	'bold green'	
deleted_style	= 'bold #f7768e'
format = '[+$added]($added_style)\\[-$deleted]($deleted_style) '

[git_status]
disabled = false 
format = '[\[$all_status$ahead_behind\]]() '
# format = '[$all_status$ahead_behind]() '
# $all_status == $conflicted$stashed$deleted$renamed$modified$typechanged$staged$untracked
# $ahead_behind	Displays diverged, ahead, behind or up_to_date format string based on the current status of the repo
# style = 'bold cyan'
conflicted = '[](bold #fe2c23)'
ahead	= '[⇡](bold green)'	
behind = '[⇣](bold #ff96fe)'	
# diverged = '⇕'	
diverged = '[󱡷](bold #c0caf5)'	
up_to_date = '[✓](bold #9DCD6A)'
untracked = '[?](bold #ff966e)'	
# stashed = '📦'
stashed = ''
# modified = '!'
modified = '📝' #     
staged = '[+](bold #7aa2f7)'	
renamed = '[»](bold purple)'
deleted = '[✘](bold red)'

[docker_context]
disabled = false
format = 'via [  $context](blue #2363ec) ' 
only_with_files = true
detect_files = ['compose.yml', 'compose.yaml', 'docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
# detect_extensions = []
# detect_folders = []

[package]
disabled = false
# format = 'via [ $version](bold) '
format = '[ $version](bold #ff6fcc) '
version_format = 'v${raw}' # raw,major,minor,patch

[c]
disabled = true
format = '[C $version\($name\)](bold purple) '
detect_extensions = ['c','h']
version_format = 'v${raw}' # raw,major,minor,patch

[cpp]
disabled = false
format = '[ $version](bold #599eff) ' #f0018f 
detect_extensions = ['cpp', 'cc', 'cxx', 'c++', 'hpp', 'hh', 'hxx', 'h++', 'tcc']
version_format = 'v${raw}' # raw,major,minor,patch

[cmake]
disabled = false
format = '[ $version](bold #054e8c) '
version_format = 'v${raw}' # raw,major,minor,patch

[golang]
disabled = false
format = '[ $version](bold #00acd7) '
version_format = 'v${raw}' # raw,major,minor,patch
detect_files = ['go.mod', 'go.sum', 'go.work', 'glide.yaml', 'Gopkg.yml', 'Gopkg.lock', '.go-version']
detect_extensions = ['go']

[java]
disabled = false
format = '[󰬷 $version](bold red) '
version_format = 'v${raw}'
detect_extensions = ['java', 'class', 'gradle', 'jar', 'cljs', 'cljc']
detect_files = ['pom.xml', 'build.gradle.kts', 'build.sbt', '.java-version', 'deps.edn', 'project.clj', 'build.boot', '.sdkmanrc']

[lua]
disabled = false
format = '[󰢱 $version](bold #3174f1) '
version_format = 'v${raw}' # raw,major,minor,patch
detect_extensions	= ['lua']	
detect_files = ['.lua-version']

[nodejs]
disabled = false
format = '[ $version](bold #69a15c) '
version_format = 'v${raw}' # raw,major,minor,patch
detect_extensions = ['js', 'mjs', 'cjs', 'ts', 'mts', 'cts']
detect_files = ['package.json', '.node-version', '.nvmrc']

[ocaml]
disabled = false
format = '🐪 [$version](bold #f6b03e) '

[python]
disabled = false
format = '[󰌠 $version](bold #39a5cd) '
version_format = 'v${raw}' # raw,major,minor,patch
detect_extensions	= ['py', 'ipynb']

[ruby]
disabled = false
format = '[ $version](bold #a91501) '
version_format = 'v${raw}' # raw,major,minor,patch
detect_extensions = ['rb']
detect_files = ['Gemfile', '.ruby-version']	
detect_variables = ['RUBY_VERSION', 'RBENV_VERSION']

[rust]
disabled = false
format = '[🦀 $version](bold #ff5f00) '
version_format = 'v${raw}' # raw,major,minor,patch
detect_extensions = ['rs']	
detect_files = ['Cargo.toml']

[solidity]
disabled = false
format = '[ $version](bold #2f29ab) '
version_format = 'v${raw}}' # raw,major,minor,patch
detect_extensions = ['sol']

[cmd_duration]
disabled = false
min_time = 2000	
format = 'took [$duration](bold yellow) '
show_milliseconds = false
show_notifications = false 

[line_break]
disabled = false

[character] 
disabled = false
# success_symbol ="[⤷](bold green)"
# success_symbol ="[](bold green)"
success_symbol ="[󰁔](bold green)"
error_symbol ="[󰁔](bold red)"
